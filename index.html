<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            border: 4px solid #4ecca3;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.3);
        }
        #ui {
            position: absolute;
            top: -50px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: #fff;
            font-size: 18px;
        }
        #ui span {
            background: rgba(78, 204, 163, 0.2);
            padding: 8px 16px;
            border-radius: 5px;
        }
        #instructions {
            position: absolute;
            bottom: -40px;
            left: 0;
            width: 100%;
            color: #888;
            font-size: 14px;
            text-align: center;
        }
        #gameOver, #levelComplete {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 2px solid #4ecca3;
            z-index: 100;
        }
        #gameOver h2, #levelComplete h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        #gameOver h2 {
            color: #ff6b6b;
        }
        #levelComplete h2 {
            color: #4ecca3;
        }
        #gameOver p, #levelComplete p {
            color: #fff;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .btn {
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover {
            background: #3db892;
        }
        .btn-restart {
            background: #ff6b6b;
            color: #fff;
        }
        .btn-restart:hover {
            background: #ee5a5a;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <span>关卡: <span id="level">1</span></span>
            <span>分数: <span id="score">0</span></span>
            <span>生命: <span id="lives">3</span></span>
        </div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="instructions">
            方向键/WASD 移动 | 空格键发射 | 消灭敌人过关
        </div>
        <div id="levelComplete">
            <h2>过关!</h2>
            <p>下一关敌人更强了!</p>
            <button id="nextLevelBtn" class="btn">下一关</button>
        </div>
        <div id="gameOver">
            <h2>游戏结束</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <p>通过关卡: <span id="finalLevel">0</span></p>
            <button id="restartBtn" class="btn btn-restart">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const levelEl = document.getElementById('level');
        const gameOverEl = document.getElementById('gameOver');
        const levelCompleteEl = document.getElementById('levelComplete');
        const finalScoreEl = document.getElementById('finalScore');
        const finalLevelEl = document.getElementById('finalLevel');
        const nextLevelBtn = document.getElementById('nextLevelBtn');
        const restartBtn = document.getElementById('restartBtn');

        const GRID_SIZE = 40;
        const COLS = canvas.width / GRID_SIZE;
        const ROWS = canvas.height / GRID_SIZE;

        // 游戏状态
        let score = 0;
        let lives = 3;
        let level = 1;
        let gameOver = false;
        let levelComplete = false;

        // 玩家
        let player = {
            x: canvas.width / 2 - GRID_SIZE / 2,
            y: canvas.height - GRID_SIZE * 2,
            width: GRID_SIZE - 4,
            height: GRID_SIZE - 4,
            speed: 4,
            direction: 'up',
            color: '#4ecca3',
            canShoot: true,
            shootDelay: 0
        };

        // 子弹
        let bullets = [];
        let enemyBullets = [];

        // 敌人
        let enemies = [];

        // 墙壁 (带血量)
        let walls = [];

        // 爆炸
        let explosions = [];

        // 按键
        const keys = {};

        // 关卡配置
        function getLevelConfig(lvl) {
            return {
                enemies: Math.min(3 + lvl, 8),
                enemySpeed: 1.0 + lvl * 0.3,
                enemyShootRate: Math.max(80 - lvl * 8, 40)
            };
        }

        // 初始化墙壁
        function initWalls() {
            walls = [];
            // 边界 - 石头墙壁（不可摧毁）
            for (let i = 0; i < COLS; i++) {
                walls.push({ x: i * GRID_SIZE, y: 0, width: GRID_SIZE, height: GRID_SIZE, type: 'steel', hp: 999 });
                walls.push({ x: i * GRID_SIZE, y: canvas.height - GRID_SIZE, width: GRID_SIZE, height: GRID_SIZE, type: 'steel', hp: 999 });
            }
            for (let i = 1; i < ROWS - 1; i++) {
                walls.push({ x: 0, y: i * GRID_SIZE, width: GRID_SIZE, height: GRID_SIZE, type: 'steel', hp: 999 });
                walls.push({ x: canvas.width - GRID_SIZE, y: i * GRID_SIZE, width: GRID_SIZE, height: GRID_SIZE, type: 'steel', hp: 999 });
            }

            // 关卡内部障碍
            if (level >= 2) {
                for (let i = 3; i < 12; i++) {
                    if (i !== 6 && i !== 9) {
                        walls.push({ x: i * GRID_SIZE, y: 200, width: GRID_SIZE, height: GRID_SIZE, type: 'brick', hp: 2 });
                    }
                }
            }
            if (level >= 3) {
                for (let i = 3; i < 12; i++) {
                    if (i !== 5 && i !== 8) {
                        walls.push({ x: i * GRID_SIZE, y: 360, width: GRID_SIZE, height: GRID_SIZE, type: 'brick', hp: 2 });
                    }
                }
            }
            if (level >= 4) {
                walls.push({ x: 280, y: 200, width: GRID_SIZE, height: GRID_SIZE, type: 'steel', hp: 999 });
                walls.push({ x: 280, y: 240, width: GRID_SIZE, height: GRID_SIZE, type: 'steel', hp: 999 });
            }
            if (level >= 5) {
                // 中心堡垒
                walls.push({ x: 260, y: 280, width: GRID_SIZE, height: GRID_SIZE, type: 'steel', hp: 999 });
                walls.push({ x: 300, y: 280, width: GRID_SIZE, height: GRID_SIZE, type: 'steel', hp: 999 });
            }
        }

        // 初始化敌人
        function initEnemies() {
            enemies = [];
            const config = getLevelConfig(level);
            const positions = [
                { x: 80, y: 60 }, { x: 260, y: 60 }, { x: 440, y: 60 },
                { x: 160, y: 100 }, { x: 340, y: 100 }, { x: 520, y: 100 },
                { x: 120, y: 140 }, { x: 300, y: 140 }, { x: 480, y: 140 }
            ];

            for (let i = 0; i < config.enemies; i++) {
                const pos = positions[i % positions.length];
                enemies.push({
                    x: pos.x,
                    y: pos.y,
                    width: GRID_SIZE - 4,
                    height: GRID_SIZE - 4,
                    speed: config.enemySpeed,
                    direction: 'down',
                    color: ['#ff6b6b', '#f39c12', '#9b59b6', '#3498db'][i % 4],
                    shootTimer: Math.random() * config.enemyShootRate,
                    shootRate: config.enemyShootRate,
                    targetDir: null,
                    chaseMode: Math.random() > 0.5,
                    moveTimer: 0
                });
            }
        }

        function initLevel() {
            initWalls();
            initEnemies();
            bullets = [];
            enemyBullets = [];
            explosions = [];
        }

        function resetPlayer() {
            player.x = canvas.width / 2 - GRID_SIZE / 2;
            player.y = canvas.height - GRID_SIZE * 2;
            player.direction = 'up';
        }

        // 绘制
        function drawBackground() {
            ctx.fillStyle = '#2d2d44';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#3d3d5c';
            ctx.lineWidth = 1;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }
        }

        function drawTank(tank, isPlayer = false) {
            ctx.save();
            ctx.translate(tank.x + tank.width / 2, tank.y + tank.height / 2);
            const angle = { 'up': 0, 'down': Math.PI, 'left': -Math.PI / 2, 'right': Math.PI / 2 }[tank.direction];
            ctx.rotate(angle);
            ctx.fillStyle = tank.color;
            ctx.fillRect(-tank.width / 2, -tank.height / 2, tank.width, tank.height);
            ctx.fillStyle = isPlayer ? '#3db892' : shadeColor(tank.color, -20);
            ctx.fillRect(-3, -tank.height / 2 - 10, 6, 15);
            ctx.fillStyle = isPlayer ? '#2d8a6e' : shadeColor(tank.color, -30);
            ctx.fillRect(-tank.width / 2 - 3, -tank.height / 2, 4, tank.height);
            ctx.fillRect(tank.width / 2 - 1, -tank.height / 2, 4, tank.height);
            ctx.restore();
        }

        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.max(0, Math.min(255, (num >> 16) + amt));
            const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
            const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

        function drawWalls() {
            walls.forEach(wall => {
                if (wall.type === 'brick') {
                    const damage = 1 - wall.hp / 3;
                    ctx.fillStyle = `rgb(${192 - damage * 80}, ${57 - damage * 30}, ${43 - damage * 20})`;
                    ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
                    ctx.strokeStyle = '#922b21';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(wall.x + 2, wall.y + 2, wall.width - 4, wall.height - 4);
                    // 裂纹效果
                    if (wall.hp < 3) {
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(wall.x + 5, wall.y + 5);
                        ctx.lineTo(wall.x + 20, wall.y + 20);
                        ctx.stroke();
                    }
                    if (wall.hp < 2) {
                        ctx.beginPath();
                        ctx.moveTo(wall.x + 30, wall.y + 5);
                        ctx.lineTo(wall.x + 15, wall.y + 35);
                        ctx.stroke();
                    }
                } else if (wall.type === 'steel') {
                    ctx.fillStyle = '#7f8c8d';
                    ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
                    ctx.fillStyle = '#95a5a6';
                    ctx.fillRect(wall.x + 4, wall.y + 4, wall.width - 8, wall.height - 8);
                }
            });
        }

        function drawBullets() {
            ctx.fillStyle = '#f1c40f';
            ctx.shadowColor = '#f1c40f';
            ctx.shadowBlur = 10;
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#e74c3c';
            enemyBullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawExplosions() {
            explosions.forEach((exp, idx) => {
                const alpha = 1 - exp.life / exp.maxLife;
                const radius = exp.radius * (1 + exp.life / exp.maxLife);
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, ${150 - exp.life * 2}, 0, ${alpha})`;
                ctx.fill();
                exp.life--;
                if (exp.life <= 0) explosions.splice(idx, 1);
            });
        }

        // 碰撞检测
        function checkCollision(x, y, w, h, excludeIdx = -1) {
            for (let wall of walls) {
                if (x < wall.x + wall.width && x + w > wall.x &&
                    y < wall.y + wall.height && y + h > wall.y) {
                    return wall;
                }
            }
            for (let i = 0; i < enemies.length; i++) {
                if (i === excludeIdx) continue;
                const e = enemies[i];
                if (x < e.x + e.width && x + w > e.x && y < e.y + e.height && y + h > e.y) {
                    return e;
                }
            }
            if (excludeIdx !== 'player') {
                if (x < player.x + player.width && x + w > player.x &&
                    y < player.y + player.height && y + h > player.y) {
                    return player;
                }
            }
            return null;
        }

        // 更新玩家
        function updatePlayer() {
            let dx = 0, dy = 0;
            if (keys['ArrowUp'] || keys['KeyW']) { dy = -player.speed; player.direction = 'up'; }
            else if (keys['ArrowDown'] || keys['KeyS']) { dy = player.speed; player.direction = 'down'; }
            else if (keys['ArrowLeft'] || keys['KeyA']) { dx = -player.speed; player.direction = 'left'; }
            else if (keys['ArrowRight'] || keys['KeyD']) { dx = player.speed; player.direction = 'right'; }

            if (dx !== 0 && !checkCollision(player.x + dx, player.y, player.width, player.height, 'player')) {
                player.x += dx;
            }
            if (dy !== 0 && !checkCollision(player.x, player.y + dy, player.width, player.height, 'player')) {
                player.y += dy;
            }

            player.x = Math.max(GRID_SIZE, Math.min(canvas.width - player.width - GRID_SIZE, player.x));
            player.y = Math.max(GRID_SIZE, Math.min(canvas.height - player.height - GRID_SIZE, player.y));

            if (player.shootDelay > 0) player.shootDelay--;
            if (player.shootDelay <= 0) player.canShoot = true;
        }

        // 更新敌人 - 巡逻为主，玩家靠近时攻击
        function updateEnemies() {
            enemies.forEach((enemy, idx) => {
                enemy.shootTimer++;
                enemy.moveTimer = (enemy.moveTimer || 0) + 1;

                // 计算与玩家的方向和距离
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // 玩家靠近时转向玩家并射击（攻击模式）
                if (dist < 250) {
                    // 朝玩家方向射击
                    if (enemy.shootTimer > enemy.shootRate) {
                        // 根据玩家位置决定朝向
                        if (Math.abs(dx) > Math.abs(dy)) {
                            enemy.direction = dx > 0 ? 'right' : 'left';
                        } else {
                            enemy.direction = dy > 0 ? 'down' : 'up';
                        }
                        shoot(enemy, false);
                        enemy.shootTimer = 0;
                    }
                } else {
                    // 大多数时间巡逻
                    if (enemy.shootTimer > enemy.shootRate * 1.5) {
                        shoot(enemy, false);
                        enemy.shootTimer = 0;
                    }

                    // 每40帧随机改变方向
                    if (enemy.moveTimer >= 40) {
                        enemy.moveTimer = 0;
                        const dirs = ['up', 'down', 'left', 'right'];
                        enemy.direction = dirs[Math.floor(Math.random() * 4)];
                    }
                }

                // 移动
                const speed = enemy.speed * 0.7;
                let newX = enemy.x, newY = enemy.y;
                switch (enemy.direction) {
                    case 'up': newY -= speed; break;
                    case 'down': newY += speed; break;
                    case 'left': newX -= speed; break;
                    case 'right': newX += speed; break;
                }

                if (!checkCollision(newX, newY, enemy.width, enemy.height, idx)) {
                    enemy.x = newX;
                    enemy.y = newY;
                } else {
                    // 被挡住随机转向
                    const dirs = ['up', 'down', 'left', 'right'];
                    enemy.direction = dirs[Math.floor(Math.random() * 4)];
                }

                // 边界
                enemy.x = Math.max(GRID_SIZE, Math.min(canvas.width - enemy.width - GRID_SIZE, enemy.x));
                enemy.y = Math.max(GRID_SIZE, Math.min(canvas.height - enemy.height - GRID_SIZE, enemy.y));
            });
        }

        function shoot(tank, isPlayer) {
            if (isPlayer && !player.canShoot) return;
            const speed = isPlayer ? 10 : 5;
            let dx = 0, dy = 0;
            switch (tank.direction) {
                case 'up': dy = -speed; break;
                case 'down': dy = speed; break;
                case 'left': dx = -speed; break;
                case 'right': dx = speed; break;
            }
            if (isPlayer) {
                bullets.push({ x: tank.x + tank.width / 2, y: tank.y + tank.height / 2, dx, dy });
                player.canShoot = false;
                player.shootDelay = 15;
            } else {
                enemyBullets.push({ x: tank.x + tank.width / 2, y: tank.y + tank.height / 2, dx, dy });
            }
        }

        function updateBullets() {
            bullets = bullets.filter(b => {
                b.x += b.dx;
                b.y += b.dy;
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) return false;
                for (let i = walls.length - 1; i >= 0; i--) {
                    const w = walls[i];
                    if (b.x > w.x && b.x < w.x + w.width && b.y > w.y && b.y < w.y + w.height) {
                        w.hp--;
                        if (w.hp <= 0) {
                            explosions.push({ x: w.x + w.width/2, y: w.y + w.height/2, radius: 15, life: 10, maxLife: 10 });
                            walls.splice(i, 1);
                        }
                        return false;
                    }
                }
                return true;
            });

            enemyBullets = enemyBullets.filter(b => {
                b.x += b.dx;
                b.y += b.dy;
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) return false;
                for (let i = walls.length - 1; i >= 0; i--) {
                    const w = walls[i];
                    if (b.x > w.x && b.x < w.x + w.width && b.y > w.y && b.y < w.y + w.height) {
                        if (w.type === 'brick') {
                            w.hp--;
                            if (w.hp <= 0) {
                                explosions.push({ x: w.x + w.width/2, y: w.y + w.height/2, radius: 15, life: 10, maxLife: 10 });
                                walls.splice(i, 1);
                            }
                        }
                        return false;
                    }
                }
                return true;
            });
        }

        function checkBulletCollisions() {
            bullets = bullets.filter(b => {
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    if (b.x > e.x && b.x < e.x + e.width && b.y > e.y && b.y < e.y + e.height) {
                        explosions.push({ x: e.x + e.width/2, y: e.y + e.height/2, radius: 20, life: 15, maxLife: 15 });
                        enemies.splice(i, 1);
                        score += 100 * level;
                        scoreEl.textContent = score;
                        return false;
                    }
                }
                return true;
            });

            enemyBullets = enemyBullets.filter(b => {
                if (b.x > player.x && b.x < player.x + player.width &&
                    b.y > player.y && b.y < player.y + player.height) {
                    explosions.push({ x: player.x + player.width/2, y: player.y + player.height/2, radius: 25, life: 20, maxLife: 20 });
                    lives--;
                    livesEl.textContent = lives;
                    resetPlayer();
                    if (lives <= 0) endGame();
                    return false;
                }
                return true;
            });
        }

        function checkLevelComplete() {
            if (enemies.length === 0 && !levelComplete && !gameOver) {
                levelComplete = true;
                levelCompleteEl.style.display = 'block';
            }
        }

        function startNextLevel() {
            level++;
            levelEl.textContent = level;
            levelComplete = false;
            levelCompleteEl.style.display = 'none';
            resetPlayer();
            initLevel();
        }

        function endGame() {
            gameOver = true;
            finalScoreEl.textContent = score;
            finalLevelEl.textContent = level;
            gameOverEl.style.display = 'block';
        }

        function restartGame() {
            score = 0;
            lives = 3;
            level = 1;
            gameOver = false;
            levelComplete = false;
            resetPlayer();
            bullets = [];
            enemyBullets = [];
            explosions = [];
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            levelEl.textContent = level;
            gameOverEl.style.display = 'none';
            levelCompleteEl.style.display = 'none';
            initLevel();
        }

        nextLevelBtn.addEventListener('click', startNextLevel);
        restartBtn.addEventListener('click', restartGame);

        function gameLoop() {
            if (!gameOver && !levelComplete) {
                drawBackground();
                drawWalls();
                updatePlayer();
                updateEnemies();
                updateBullets();
                checkBulletCollisions();
                checkLevelComplete();
                drawTank(player, true);
                enemies.forEach(e => drawTank(e, false));
                drawBullets();
                drawExplosions();
            }
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space' && !gameOver && !levelComplete) {
                shoot(player, true);
            }
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        initLevel();
        gameLoop();
    </script>
</body>
</html>
